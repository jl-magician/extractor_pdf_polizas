{% extends "base.html" %}
{% block title %}Dashboard — Extractor de Polizas{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold text-gray-900 mb-6">Dashboard</h1>

<!-- Date range selector (D-17): presets + custom range -->
<div class="flex flex-wrap items-end gap-2 mb-6">
  <button hx-get="/?periodo=7d" hx-target="#dashboard-stats" hx-swap="innerHTML"
          class="min-h-[44px] px-4 py-2 text-sm font-semibold rounded-md transition-colors
          {% if periodo == '7d' %}bg-blue-600 text-white{% else %}bg-white text-gray-700 border border-gray-300 hover:bg-gray-50{% endif %}">
    Ultimos 7 dias
  </button>
  <button hx-get="/?periodo=30d" hx-target="#dashboard-stats" hx-swap="innerHTML"
          class="min-h-[44px] px-4 py-2 text-sm font-semibold rounded-md transition-colors
          {% if periodo == '30d' %}bg-blue-600 text-white{% else %}bg-white text-gray-700 border border-gray-300 hover:bg-gray-50{% endif %}">
    Ultimos 30 dias
  </button>
  <button hx-get="/" hx-target="#dashboard-stats" hx-swap="innerHTML"
          class="min-h-[44px] px-4 py-2 text-sm font-semibold rounded-md transition-colors
          {% if periodo == 'all' %}bg-blue-600 text-white{% else %}bg-white text-gray-700 border border-gray-300 hover:bg-gray-50{% endif %}">
    Todo
  </button>

  <!-- Custom date range (D-17) -->
  <div class="flex items-end gap-2 ml-4">
    <div>
      <label for="desde" class="text-xs font-semibold uppercase tracking-wide text-gray-500">Desde</label>
      <input type="date" id="desde" name="desde" value="{{ desde }}"
             hx-get="/" hx-target="#dashboard-stats" hx-swap="innerHTML"
             hx-include="#hasta"
             class="block min-h-[44px] px-3 py-2 text-sm text-gray-900 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mt-1">
    </div>
    <div>
      <label for="hasta" class="text-xs font-semibold uppercase tracking-wide text-gray-500">Hasta</label>
      <input type="date" id="hasta" name="hasta" value="{{ hasta }}"
             hx-get="/" hx-target="#dashboard-stats" hx-swap="innerHTML"
             hx-include="#desde"
             class="block min-h-[44px] px-3 py-2 text-sm text-gray-900 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mt-1">
    </div>
  </div>
</div>

<div id="dashboard-stats">
  {% include "partials/dashboard_stats.html" %}
</div>
{% endblock %}
