<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Extractor de Polizas{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</head>
<body class="min-h-screen flex bg-gray-50">
  <!-- Sidebar per D-19: always visible, dark bg like Linear/Notion -->
  <nav class="w-60 bg-gray-800 text-gray-100 flex-shrink-0 flex flex-col">
    <div class="p-6">
      <span class="text-xl font-semibold text-white">Extractor de Polizas</span>
    </div>
    <div class="flex-1 flex flex-col gap-1 px-3">
      <a href="/" class="flex items-center gap-3 min-h-[44px] px-3 rounded-md text-sm {% if active_page == 'dashboard' %}border-l-2 border-blue-400 bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        <!-- Heroicon: chart-bar (inline SVG, 20x20) -->
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>
        Dashboard
      </a>
      <a href="/subir" class="flex items-center gap-3 min-h-[44px] px-3 rounded-md text-sm {% if active_page == 'upload' %}border-l-2 border-blue-400 bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        <!-- Heroicon: arrow-up-tray -->
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
        Subir PDFs
      </a>
      <a href="/ui/polizas" class="flex items-center gap-3 min-h-[44px] px-3 rounded-md text-sm {% if active_page == 'polizas' %}border-l-2 border-blue-400 bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        <!-- Heroicon: document-text -->
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        Polizas
      </a>
      <a href="/ui/lotes" class="flex items-center gap-3 min-h-[44px] px-3 rounded-md text-sm {% if active_page == 'jobs' %}border-l-2 border-blue-400 bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
        <!-- Heroicon: clock -->
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        Historial de Lotes
      </a>
    </div>
    <div class="px-6 py-4 text-xs text-gray-500">v2.0</div>
  </nav>
  <!-- Main content area -->
  <main class="flex-1 bg-gray-50 overflow-y-auto">
    <div class="max-w-7xl mx-auto px-8 py-8">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
